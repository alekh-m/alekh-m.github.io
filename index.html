<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Tic Tac Toe</h1>

    <div class="controls">
      <label for="mode">Game Mode:</label>
      <select id="mode">
        <option value="computer">Play with computer</option>
        <option value="multiplayer">Play with another player</option>
      </select>
      <button id="newGameBtn">Start New Game</button>
    </div>

    <p id="status">Choose a mode and start.</p>

    <section id="board" class="board" aria-label="Tic Tac Toe board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
